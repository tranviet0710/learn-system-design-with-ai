version: '3'
services:
  # 1. Thêm bộ não trung tâm Redis
  redis-server:
    image: redis:alpine

  # 2. Cụm máy chủ Web
  web:
    build: .
    depends_on:
      - redis-server # Đảm bảo Redis khởi động xong thì Web mới được chạy

  # 3. Lễ tân điều phối
  load_balancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    depends_on:
      - web